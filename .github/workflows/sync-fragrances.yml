name: Sync fragrance data from Google Sheet

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */2 * * *"
  push:
    paths:
      - ".github/workflows/sync-fragrances.yml"
      - "scripts/sync-fragrances.js"

permissions:
  contents: write

concurrency:
  group: fragrance-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate data/fragrances.json from Google Sheet
        env:
          SHEET_ID: "1bXgcQULRQu5BgXtabt7dwBcV9SmWaeBNH0sQIswPcoY"
          SHEET_GID: "0"
        run: node scripts/sync-fragrances.js

      - name: Commit updated JSON if changed
        run: |
          if git diff --quiet -- data/fragrances.json; then
            echo "No fragrance data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fragrances.json
          git commit -m "chore: sync fragrances data from Google Sheet"
          git push
