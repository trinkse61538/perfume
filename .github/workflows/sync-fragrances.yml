name: Sync fragrance data and build SEO pages

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */2 * * *"
  push:
    paths:
      - ".github/workflows/sync-fragrances.yml"
      - "scripts/sync-fragrances.js"
      - "scripts/generate-seo-pages.js"

permissions:
  contents: write

concurrency:
  group: fragrance-data-and-seo-sync
  cancel-in-progress: false

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync data from Google Sheet
        env:
          SHEET_ID: "1bXgcQULRQu5BgXtabt7dwBcV9SmWaeBNH0sQIswPcoY"
          SHEET_GID: "0"
        run: node scripts/sync-fragrances.js

      - name: Generate static fragrance and perfumer pages
        run: node scripts/generate-seo-pages.js

      - name: Validate generated output
        run: |
          test -s data/fragrances.json
          test -s fragrance/index.html
          test -s perfumer/index.html
          test -s sitemap.xml
          test -s seo-pages-manifest.json
          echo "Generated SEO output is present."

      - name: Commit data and generated SEO pages if changed
        run: |
          if git diff --quiet -- data/fragrances.json fragrance perfumer seo-assets sitemap.xml seo-pages-manifest.json; then
            echo "No data or SEO page changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fragrances.json fragrance perfumer seo-assets sitemap.xml seo-pages-manifest.json
          git commit -m "chore: sync fragrance data and rebuild SEO pages"
          git push
